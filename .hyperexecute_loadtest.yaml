---
version: "0.1"
globalTimeout: 60
testSuiteTimeout: 30
testSuiteStep: 30
runson: linux
retryOnFailure: false
maxRetries: 0
# The spec itself spawns 4 parallel cloud sessions via Playwright workers,
# so HyperExecute only needs a single VM to drive them. Bumping the matrix
# here would multiply cloud-minute spend without adding coverage.
concurrency: ${CONCURRENCY}
matrix:
  worker: [1]
env:
  PLAYWRIGHT_BROWSERS_PATH: $PWD/ms-playwright
  LOADTEST_URL: ${LOADTEST_URL}
  CONCURRENCY: ${CONCURRENCY}
pre:
  - test -d node_modules || npm ci --prefer-offline --no-audit
  - test -d "$PWD/ms-playwright" || npx playwright install --with-deps chromium
cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules
  - ms-playwright
testSuites:
  # Generate the custom HTML report INSIDE the test suite so the file is on
  # disk before HyperExecute collects partialReports. (Running it from `post`
  # caused the dashboard to show "report generation scheduled" — the file
  # wasn't there when the report scheduler looked.)
  # The report is written to two locations:
  #   1. loadtest-html-report/index.html — its own dashboard "Report" entry
  #   2. playwright-report/loadtest-report.html — fallback, always reachable
  #      under the Playwright report URL (e.g. <playwright-report>/loadtest-report.html)
  # `;` (not `&&`) so the report is generated even when Playwright reports
  # failures; trailing exit preserves Playwright's exit code.
  - bash -c 'npx playwright test tests/loadtest_storyblock.spec.js; rc=$?; node utils/generate-loadtest-report.js || true; mkdir -p playwright-report && cp loadtest-html-report/index.html playwright-report/loadtest-report.html 2>/dev/null || true; exit $rc'
jobLabel: [playwright-VanillaJS, linux, loadtest, web-vitals]

mergeArtifacts: true
taskIdentifierInNonConflictingArtifacts: true
uploadArtefacts:
  - name: web-vitals-json
    path:
      - artifacts/loadtest/**/*.json
  - name: loadtest-html-report
    path:
      - loadtest-html-report/**/*
  - name: playwright-html-report
    path:
      - playwright-report/**/*
