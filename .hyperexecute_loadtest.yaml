---
version: "0.1"
# Bumped to fit a ~42 min Task (10 × ~4 min iterations + cold-cache setup).
# globalTimeout covers the whole job; if the LT account caps parallel VMs
# below NUM_VMS, Tasks queue and wall-clock grows linearly with waves.
globalTimeout: 150
testSuiteTimeout: 60
testSuiteStep: 60
runson: linux
retryOnFailure: false
maxRetries: 0
# NUM_VMS controls how many HyperExecute Tasks (VMs) the job spawns.
# Each Task runs one Playwright test repeated 10× sequentially.
#   NUM_VMS=10  hyperexecute --config .hyperexecute_loadtest.yaml   # smoke
#   NUM_VMS=50  hyperexecute --config .hyperexecute_loadtest.yaml   # mid
#   NUM_VMS=300 hyperexecute --config .hyperexecute_loadtest.yaml   # full
concurrency: ${NUM_VMS}
autoSplit: true
# `seq 1 $NUM_VMS` emits one shard ID per line; HyperExecute creates one Task
# per ID and passes the value as $test to the runner command.
testDiscovery:
  type: raw
  mode: dynamic
  command: seq 1 ${NUM_VMS}
env:
  PLAYWRIGHT_BROWSERS_PATH: $PWD/ms-playwright
  LOADTEST_URL: ${LOADTEST_URL}
  NUM_VMS: ${NUM_VMS}
  # CONCURRENCY=1 makes the spec's `for` loop emit a single Playwright test;
  # --repeat-each=10 below then runs that one test 10 times sequentially.
  CONCURRENCY: 1
pre:
  - test -d node_modules || npm ci --prefer-offline --no-audit
  - test -d "$PWD/ms-playwright" || npx playwright install --with-deps chromium
cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules
  - ms-playwright
# Same runner for every Task; $test is the shard ID from testDiscovery and
# is used only as a label so per-Task artifacts don't collide.
# Report generation runs INSIDE the suite so the file is on disk before
# HyperExecute collects partialReports.
# `;` (not `&&`) so the report is generated even on Playwright failures;
# trailing exit preserves Playwright's exit code.
testRunnerCommand: bash -c 'npx playwright test tests/loadtest_storyblock.spec.js --workers=1 --repeat-each=10; rc=$?; node utils/generate-loadtest-report.js || true; mkdir -p playwright-report && cp loadtest-html-report/index.html playwright-report/loadtest-report.html 2>/dev/null || true; exit $rc'
jobLabel: [playwright-VanillaJS, linux, loadtest, web-vitals]

mergeArtifacts: true
taskIdentifierInNonConflictingArtifacts: true
uploadArtefacts:
  - name: web-vitals-json
    path:
      - artifacts/loadtest/**/*.json
  - name: loadtest-html-report
    path:
      - loadtest-html-report/**/*
  - name: playwright-html-report
    path:
      - playwright-report/**/*
